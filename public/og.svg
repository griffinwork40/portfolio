  <line x1="0" y1="320" x2="1200" y2="320" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
  <line x1="0" y1="360" x2="1200" y2="360" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
