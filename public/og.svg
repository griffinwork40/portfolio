  <line x1="840" y1="0" x2="840" y2="630" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
  <line x1="880" y1="0" x2="880" y2="630" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
  <line x1="920" y1="0" x2="920" y2="630" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
  <line x1="1000" y1="0" x2="1000" y2="630" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
  <line x1="1040" y1="0" x2="1040" y2="630" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
  <line x1="1080" y1="0" x2="1080" y2="630" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
  <line x1="1120" y1="0" x2="1120" y2="630" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
  <line x1="1160" y1="0" x2="1160" y2="630" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
  <line x1="1200" y1="0" x2="1200" y2="630" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
  <line x1="0" y1="0" x2="1200" y2="0" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
  <line x1="0" y1="40" x2="1200" y2="40" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
