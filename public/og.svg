  <line x1="640" y1="0" x2="640" y2="630" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
  <line x1="680" y1="0" x2="680" y2="630" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
  <line x1="760" y1="0" x2="760" y2="630" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
