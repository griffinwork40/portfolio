<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Slight paper texture via feTurbulence -->
    <filter id="paper-texture" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
      <feComponentTransfer in="blended">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
    <!-- Stamp border filter: roughen edges slightly -->
    <filter id="stamp-rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.05" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Paper background -->
  <rect width="1200" height="630" fill="#f6f1e6"/>

  <!-- Subtle paper texture overlay -->
  <rect width="1200" height="630" fill="#ede6d4" opacity="0.18" filter="url(#paper-texture)"/>

  <!-- Faint graph grid lines -->
  <line x1="0" y1="0" x2="0" y2="630" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
  <line x1="40" y1="0" x2="40" y2="630" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
  <line x1="80" y1="0" x2="80" y2="630" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
  <line x1="120" y1="0" x2="120" y2="630" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
  <line x1="160" y1="0" x2="160" y2="630" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
  <line x1="200" y1="0" x2="200" y2="630" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
  <line x1="280" y1="0" x2="280" y2="630" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
  <line x1="320" y1="0" x2="320" y2="630" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
  <line x1="360" y1="0" x2="360" y2="630" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
