  <line x1="480" y1="0" x2="480" y2="630" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
  <line x1="520" y1="0" x2="520" y2="630" stroke="#c8c0a8" stroke-width="0.6" opacity="0.5"/>
